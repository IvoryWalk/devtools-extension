<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolBox 功能测试</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f7; }
        .test-section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .test-pass { color: #34c759; font-weight: bold; }
        .test-fail { color: #ff3b30; font-weight: bold; }
        .test-case { padding: 10px; border-left: 3px solid #007aff; margin: 10px 0; background: #f8f9fa; }
        h1 { color: #1d1d1f; }
        h2 { color: #007aff; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        pre { background: #1e1e2e; color: #cdd6f4; padding: 15px; border-radius: 6px; overflow-x: auto; }
        button { padding: 8px 16px; background: #007aff; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        button:hover { background: #0066cc; }
        .summary { font-size: 18px; padding: 15px; background: #fff; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🛠️ DevToolBox 功能测试</h1>
    
    <div class="summary" id="summary">测试进行中...</div>

    <div class="test-section">
        <h2>1. JSON工具测试</h2>
        <div id="json-tests"></div>
    </div>

    <div class="test-section">
        <h2>2. 编解码工具测试</h2>
        <div id="codec-tests"></div>
    </div>

    <div class="test-section">
        <h2>3. 时间戳工具测试</h2>
        <div id="timestamp-tests"></div>
    </div>

    <div class="test-section">
        <h2>4. Cron解析测试</h2>
        <div id="cron-tests"></div>
    </div>

    <div class="test-section">
        <h2>5. 快速交互测试</h2>
        <p>在下方输入内容测试功能：</p>
        <textarea id="test-input" rows="4" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;">{"name":"test","age":25,"list":[1,2,3]}</textarea>
        <br>
        <button onclick="testJsonFormat()">JSON格式化</button>
        <button onclick="testBase64()">Base64编码</button>
        <button onclick="testUrlEncode()">URL编码</button>
        <pre id="test-output"></pre>
    </div>

    <script src="js/modules/json-tools.js"></script>
    <script src="js/modules/codec-tools.js"></script>
    <script src="js/modules/timestamp.js"></script>
    <script src="js/modules/cron-parser.js"></script>

    <script>
        let passed = 0;
        let failed = 0;

        function logTest(name, result, expected, actual) {
            const div = document.createElement('div');
            div.className = 'test-case';
            if (result) {
                passed++;
                div.innerHTML = `<span class="test-pass">✓ PASS</span> ${name}`;
            } else {
                failed++;
                div.innerHTML = `<span class="test-fail">✗ FAIL</span> ${name}<br>
                    期望: ${expected}<br>
                    实际: ${actual}`;
            }
            return div;
        }

        // JSON测试
        function runJsonTests() {
            const container = document.getElementById('json-tests');
            const testObj = {"b":2,"a":1,"c":{"z":26,"a":1}};
            const testJson = JSON.stringify(testObj);

            // 格式化测试
            let r = JsonTools.format(testJson);
            container.appendChild(logTest('JSON格式化', r.success && r.result.includes('\n'), '格式化成功', r.error || '成功'));

            // 压缩测试
            r = JsonTools.minify(testJson);
            container.appendChild(logTest('JSON压缩', r.success && !r.result.includes(' '), '压缩后无空格', r.error || r.result));

            // 转义测试
            r = JsonTools.escape('{"a":"b"}');
            container.appendChild(logTest('字符串转义', r.success && r.result.includes('\\"'), '包含转义引号', r.result));

            // 去转义测试
            r = JsonTools.unescape('{\\"a\\":\\"b\\"}');
            container.appendChild(logTest('字符串去转义', r.success && r.result.includes('"a":"b"'), '转义被移除', r.result));

            // Key排序测试
            r = JsonTools.sortKeys(testJson);
            const keys = Object.keys(JSON.parse(r.result));
            container.appendChild(logTest('Key按字母排序', keys[0] === 'a' && keys[1] === 'b' && keys[2] === 'c', 'a,b,c顺序', keys.join(',')));

            // 语法高亮测试
            r = JsonTools.format(testJson);
            container.appendChild(logTest('语法高亮', r.highlighted.includes('json-key'), '包含高亮class', '成功'));

            // 错误JSON测试
            r = JsonTools.format('{invalid json}');
            container.appendChild(logTest('错误JSON检测', !r.success, '返回错误', r.error));
        }

        // 编解码测试
        function runCodecTests() {
            const container = document.getElementById('codec-tests');
            const testStr = 'hello 你好';

            // URL编解码
            let encoded = CodecTools.urlEncode(testStr);
            let decoded = CodecTools.urlDecode(encoded.result);
            container.appendChild(logTest('URL编码', encoded.success && encoded.result.includes('%'), '包含百分号编码', encoded.result));
            container.appendChild(logTest('URL解码', decoded.result === testStr, testStr, decoded.result));

            // Unicode编解码
            encoded = CodecTools.unicodeEncode(testStr);
            decoded = CodecTools.unicodeDecode(encoded.result);
            container.appendChild(logTest('Unicode编码', encoded.success && encoded.result.includes('\\u'), '包含\\u转义', encoded.result));
            container.appendChild(logTest('Unicode解码', decoded.result === testStr, testStr, decoded.result));

            // Base64编解码
            encoded = CodecTools.base64Encode(testStr);
            decoded = CodecTools.base64Decode(encoded.result);
            container.appendChild(logTest('Base64编码', encoded.success && encoded.result.length > 0, '编码成功', encoded.result));
            container.appendChild(logTest('Base64解码(支持中文)', decoded.result === testStr, testStr, decoded.result));

            // GBK编解码
            encoded = CodecTools.gbkEncode('中文');
            container.appendChild(logTest('GBK编码', encoded.success, '编码成功', encoded.result));
        }

        // 时间戳测试
        function runTimestampTests() {
            const container = document.getElementById('timestamp-tests');

            // 获取当前时间
            let r = TimestampTools.getCurrent();
            container.appendChild(logTest('获取当前时间', r.success && r.result.timestampSec > 0, '返回时间戳', r.result.timestampSec));
            container.appendChild(logTest('数据库格式', r.result.database.match(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/), 'YYYY-MM-DD HH:mm:ss', r.result.database));

            // 时间戳转日期
            r = TimestampTools.timestampToDate('1717660496');
            container.appendChild(logTest('秒级时间戳转日期', r.success && r.result.database.includes('2024'), '返回2024年日期', r.result.database));

            r = TimestampTools.timestampToDate('1717660496000');
            container.appendChild(logTest('毫秒级时间戳转日期', r.success && r.result.timestampSec === 1717660496, '秒级时间戳正确', r.result.timestampSec));

            // 日期转时间戳
            r = TimestampTools.dateToTimestamp('2024-06-06 12:34:56');
            container.appendChild(logTest('日期转时间戳', r.success && r.result.timestampSec > 0, '返回时间戳', r.result.timestampSec));
        }

        // Cron测试
        function runCronTests() {
            const container = document.getElementById('cron-tests');

            // 每天中午12点
            let r = CronParser.getNextTimes('0 12 * * *', 5);
            container.appendChild(logTest('每天12点Cron解析', r.success && r.result.times.length === 5, '返回5次时间', `返回${r.result?.times || 0}次: ${r.error || ''}`));

            // 每5分钟
            r = CronParser.getNextTimes('*/5 * * * *', 5);
            container.appendChild(logTest('每5分钟Cron解析', r.success && r.result.times.length === 5, '返回5次时间', `返回${r.result?.times || 0}次`));

            // 错误表达式
            r = CronParser.getNextTimes('invalid cron', 5);
            container.appendChild(logTest('错误Cron检测', !r.success, '返回错误', r.error));
        }

        // 交互测试函数
        function testJsonFormat() {
            const input = document.getElementById('test-input').value;
            const r = JsonTools.format(input);
            document.getElementById('test-output').textContent = r.success ? r.result : r.error;
        }

        function testBase64() {
            const input = document.getElementById('test-input').value;
            const r = CodecTools.base64Encode(input);
            document.getElementById('test-output').textContent = r.success ? r.result : r.error;
        }

        function testUrlEncode() {
            const input = document.getElementById('test-input').value;
            const r = CodecTools.urlEncode(input);
            document.getElementById('test-output').textContent = r.success ? r.result : r.error;
        }

        // 运行所有测试
        window.onload = function() {
            runJsonTests();
            runCodecTests();
            runTimestampTests();
            runCronTests();

            document.getElementById('summary').innerHTML = 
                `<strong>测试完成：</strong> <span class="test-pass">通过 ${passed}</span> / <span class="test-fail">失败 ${failed}</span>`;
        };
    </script>
</body>
</html>
