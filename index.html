<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolBox 开发者工具箱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container full-page">
        <!-- 顶部标题栏 -->
        <header class="toolbar full-page-toolbar">
            <div class="logo">🛠️ DevToolBox 开发者工具箱</div>
            <div class="toolbar-actions">
                <button id="btn-theme" class="action-btn" title="切换主题">🌙 主题</button>
                <button id="btn-storage" class="action-btn" title="数据暂存">💾 暂存列表</button>
                <a href="settings.html" class="action-btn" title="设置">⚙️ 设置</a>
            </div>
        </header>

        <!-- 功能区：动态渲染，根据配置显示/排序 -->
        <div class="function-area" id="function-area-container">
            <!-- 功能按钮由JS动态渲染 -->
        </div>

        <!-- 主内容区：左右分栏 -->
        <main class="main-content full-page-main">
            <!-- 左栏：输入区 -->
            <section class="panel input-panel" id="input-panel">
                <div class="panel-header">
                    <span class="panel-title diff-mode" id="input-panel-title">📝 原始文本</span>
                    <div class="panel-actions">
                        <span class="char-count" id="input-count">0 行, 0 字符</span>
                        <button class="panel-btn" id="btn-input-copy" title="复制输入内容">📋 复制</button>
                        <button class="panel-btn" id="btn-input-save" title="保存输入到暂存">💾 保存</button>
                        <button class="panel-btn" id="btn-input-clear" title="清空输入">🗑️ 清空</button>
                    </div>
                </div>
                <div class="code-area-wrapper">
                    <div class="line-numbers" id="input-line-numbers">1</div>
                    <textarea id="input-area" class="code-area code-area-with-lines" placeholder="在此输入原始文本..."></textarea>
                    <pre id="input-diff-view" class="code-area output-pre" style="display:none"><code id="input-diff-code"></code></pre>
                </div>
            </section>

            <!-- 可拖拽分割线 -->
            <div class="splitter" id="splitter" title="拖拽调整宽度"></div>

            <!-- 右栏：结果区 -->
            <section class="panel output-panel" id="output-panel">
                <div class="panel-header">
                    <span class="panel-title diff-mode" id="output-panel-title">✏️ 修改文本</span>
                    <div class="panel-actions">
                        <span class="status" id="status">就绪</span>
                        <button class="panel-btn diff-only" id="btn-diff-reset" title="重新编辑" style="display:none">🔄 重新编辑</button>
                        <button class="panel-btn" id="btn-output-copy" title="复制结果">📋 复制</button>
                        <button class="panel-btn" id="btn-output-save" title="保存结果到暂存">💾 保存</button>
                        <button class="panel-btn" id="btn-output-clear" title="清空结果">🗑️ 清空</button>
                    </div>
                </div>
                <div class="diff-stats-wrapper" id="diff-stats-wrapper" style="display:none"></div>
                <div class="code-area-wrapper">
                    <div class="line-numbers" id="output-line-numbers">1</div>
                    <textarea id="output-textarea" class="code-area code-area-with-lines" placeholder="在此输入修改后的文本...&#10;&#10;输入完成后，点击上方「行比对」「词比对」「字符比对」按钮查看差异"></textarea>
                    <pre id="output-area" class="code-area output-pre" style="display:none"><code id="output-code"></code></pre>
                </div>
            </section>
        </main>
    </div>

    <!-- 数据暂存面板（侧边抽屉） -->
    <div class="storage-drawer" id="storage-drawer">
        <div class="storage-drawer-header">
            <h3>💾 数据暂存</h3>
            <button class="close-btn" id="storage-close">×</button>
        </div>
        <div class="storage-drawer-actions">
            <button class="func-btn primary" id="storage-save">保存当前内容</button>
            <button class="func-btn danger" id="storage-clear-all">清空全部</button>
        </div>
        <div class="storage-header">
            <input type="text" id="storage-search" placeholder="搜索暂存内容...">
            <span class="storage-count" id="storage-count">0/100</span>
        </div>
        <div class="storage-list" id="storage-list">
            <!-- 动态生成存储项 -->
        </div>
    </div>
    <div class="drawer-overlay" id="drawer-overlay"></div>

    <!-- 重命名弹窗 -->
    <div class="rename-modal" id="rename-modal" style="display: none;">
        <div class="rename-modal-content">
            <h4>重命名</h4>
            <input type="text" id="rename-input" class="func-input" style="width: 100%; min-width: auto; margin: 12px 0;" placeholder="输入新名称">
            <div class="btn-group" style="justify-content: flex-end; margin-top: 16px;">
                <button class="btn" id="rename-cancel">取消</button>
                <button class="btn primary" id="rename-confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 引入功能模块 -->
    <script src="js/modules/json-tools.js"></script>
    <script src="js/modules/codec-tools.js"></script>
    <script src="js/modules/timestamp.js"></script>
    <script src="js/modules/storage.js"></script>
    <script src="js/modules/cron-parser.js"></script>
    <script src="js/modules/sql-tools.js"></script>
    <script src="js/modules/diff-tools.js"></script>
    <script src="js/modules/usage-stats.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
